<!DOCTYPE html>
<html>
<head>
  <title>Pi platba – test</title>
</head>
<body>
  <button id="btn-pay">Zaplatit 5 Pi</button>
  <div id="log" style="white-space:pre; font-family:monospace; color:#222; background:#eee; padding:8px; margin-top:14px;"></div>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script>
    Pi.init({ version: "2.0" });

    function log(msg) {
      var div = document.getElementById("log");
      div.textContent += msg + "\n";
      console.log(msg);
    }

    var backendUrl = "https://backend-production-9cdf.up.railway.app";

    document.getElementById("btn-pay").onclick = async function () {
      log("== Začátek platby ==");
      if (!window.Pi) {
        alert("Pi SDK není dostupné!");
        log("Pi SDK není dostupné!");
        return;
      }
      try {
        // 1) Autentizace
        log("1) Spouštím autentizaci...");
        const scopes = ["payments", "username"];
        const auth = await Pi.authenticate(scopes, function (payment) {
          log("Neúplná platba: " + JSON.stringify(payment));
          alert("Neúplná platba: " + JSON.stringify(payment));
        });

        if (!auth || !auth.accessToken || !auth.user) {
          alert("Chyba při autentizaci!");
          log("Chyba při autentizaci!");
          return;
        }
        log("Autentizace OK: " + JSON.stringify(auth.user));

        // 2) Spuštění platby
        const paymentData = {
          amount: 5,
          memo: "Top up 600 tokens",
          metadata: { type: "topup", amount: 600 }
        };

        log("2) Volám Pi.createPayment...");
        Pi.createPayment(paymentData, {
          onReadyForServerApproval: function (paymentId) {
            log("onReadyForServerApproval: " + paymentId);
            fetch(backendUrl + "/approve", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paymentId: paymentId })
            })
            .then(res => res.json())
            .then(data => {
              log("Backend /approve OK: " + JSON.stringify(data));
              alert("Backend /approve OK: " + JSON.stringify(data));
            })
            .catch(err => {
              log("Backend /approve ERR: " + err);
              alert("Backend /approve ERR: " + err);
            });
          },
          onReadyForServerCompletion: function (paymentId, txid) {
            log("onReadyForServerCompletion: " + paymentId + " | txid: " + txid);
            fetch(backendUrl + "/complete", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paymentId: paymentId, txid: txid })
            })
            .then(res => res.json())
            .then(data => {
              log("Backend /complete OK: " + JSON.stringify(data));
              alert("Backend /complete OK: " + JSON.stringify(data));
            })
            .catch(err => {
              log("Backend /complete ERR: " + err);
              alert("Backend /complete ERR: " + err);
            });
          },
          onCancel: function (paymentId) {
            log("onCancel: " + paymentId);
            alert("Platba zrušena uživatelem!");
          },
          onError: function (err, payment) {
            log("onError: " + (err && err.message ? err.message : err) + " | payment: " + JSON.stringify(payment));
            alert("Chyba v platbě: " + (err && err.message ? err.message : err));
          }
        });
      } catch (e) {
        alert("Chyba ve flow: " + (e && e.message ? e.message : e));
        log("Chyba ve flow: " + (e && e.message ? e.message : e));
      }
    };
  </script>
</body>
</html>
