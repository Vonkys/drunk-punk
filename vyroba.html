}
// --- Nákup stroje ---
function kupitStroj(key, cena) {
  let machines = getMachines();
  let money = getMoney();
  if (machines.includes(key)) { vypisStatus("Stroj už máš!",0); return; }
  if (money < cena) { vypisStatus("Nemáš dost peněz!",0); return; }
  machines.push(key);
  setMachines(machines);
  setMoney(money-cena);
  vypisStatus("Stroj koupen!",1);
  stavPrachy();
  renderMachinesShop();
  vykresliVyrobu();
}

html += `<div class="vyrobabox prod-group"><b style="font-size:1.13em;">🍇 VÍNO</b><br>`;

if (machines.includes("lis_vino")) {

// PÁLENKY sekce

// Výrobní progress bar + text pro více výrob (unikátní ID pro každý proces)
function renderProgress(prod, typ) {
  let secondsLeft = Math.max(0, Math.ceil((prod.started + prod.duration*1000 - Date.now())/1000));
  let percent = Math.min(100, 100-100*secondsLeft/prod.duration);
  // Unikátní id pro progressy
  let id = `prodTimer_${prod.type}`;
  return `<div class="progress-container"><div class="progress-bar" id="pb_${id}" style="width:${percent}%"></div></div>
          <div class="progress-text">Zbývá: <span id="${id}">${formatTime(secondsLeft)}</span></div>`;
}
function formatTime(secs) {
  if (secs < 60) return secs + "s";
  let min = Math.floor(secs/60);
  let s = secs % 60;
  return min + "m " + s + "s";
}

// Spuštění výroby (multiprodukce)
function startProduction(type) {
  const sklad = getSklad();
  let prods = getProductions();
  // Kontrola duplicity – jen jedna stejná výroba najednou
  if (prods.find(p=>p.type===type && !p.done)) return;
  // Kontrola surovin podle typu
  if (type === "kvasit_pivo" && ((sklad["pšenice"]||0)<1 || (sklad["chmel"]||0)<1)) return;
  if (type === "varit_pivo" && ((sklad["kvas_pivo"]||0)<1)) return;
  if (type === "lisovat_vino" && ((sklad["reva"]||0)<2)) return;
  if (type === "kvasit_vino" && ((sklad["most_vino"]||0)<1)) return;
  if (type === "delat_popkorn" && ((sklad["kukuřice"]||0)<2)) return;
  // Pálenky – obecná logika
  if (type.startsWith("kvasit_") && OVOCE.includes(type.replace("kvasit_",""))) {
    let ovo = type.replace("kvasit_","");
    if ((sklad[ovo]||0) < 1) return;
    sklad[ovo]--;
    setSklad(sklad);
    prods.push({
      type,
      started: Date.now(),
      duration: PRODUCTION_TIMES[type] || 20,
      done: false
    });
    setProductions(prods);
    vykresliVyrobu();
    runProductionTimers();
    return;
  }
  if (type.startsWith("palit_") && OVOCE.includes(type.replace("palit_",""))) {
    let ovo = type.replace("palit_","");
    let kvasKey = "kvas_" + ovo;
    if ((sklad[kvasKey]||0) < 1) return;
    sklad[kvasKey]--;
    setSklad(sklad);
    prods.push({
      type,
      started: Date.now(),
      duration: PRODUCTION_TIMES[type] || 18,
      done: false
    });
    setProductions(prods);
    vykresliVyrobu();
    runProductionTimers();
    return;
  }

  // Odečíst suroviny (ostatní výroby)
  if (type === "kvasit_pivo")   { sklad["pšenice"]--; sklad["chmel"]--; }
  if (type === "varit_pivo")    { sklad["kvas_pivo"]--; }
  if (type === "lisovat_vino")  { sklad["reva"] -= 2; }
  if (type === "kvasit_vino")   { sklad["most_vino"]--; }
  if (type === "delat_popkorn") { sklad["kukuřice"] -= 2; }  
  setSklad(sklad);

  prods.push({
    type,
    started: Date.now(),
    duration: PRODUCTION_TIMES[type] || 20,
    done: false
  });
  setProductions(prods);
  vykresliVyrobu();
  runProductionTimers();
}

// Paralelní progress bary a ukončení výrob
function runProductionTimers() {
  let prods = getProductions();
  if (!prods || !prods.length) return;
  function tick() {
    let now = Date.now();
    let changed = false;
    prods = getProductions(); // načítám kvůli setTimeout kolizím
    prods.forEach((prod, idx) => {
      if (prod.done) return;
      let secondsLeft = Math.max(0, Math.ceil((prod.started + prod.duration*1000 - now)/1000));
      let percent = Math.min(100, 100-100*secondsLeft/prod.duration);
      // ProgressBar
      let id = `prodTimer_${prod.type}`;
      let timerSpan = document.getElementById(id);
      if (timerSpan) timerSpan.textContent = formatTime(secondsLeft);
      let bar = document.getElementById('pb_'+id);
      if (bar) bar.style.width = percent+"%";
      // Pokud čas uběhl, označ done a přidej produkt
      if (secondsLeft <= 0) {
        prod.done = true; changed = true;
        finishProduction(prod.type);
      }
    });
    setProductions(prods);
    vykresliVyrobu();
    if (prods.some(p=>!p.done)) setTimeout(tick, 1000);
  }
  tick();
}

// Přičtení výsledku do skladu
function finishProduction(type) {
  let sklad = getSklad();
  if (type === "kvasit_pivo")    sklad["kvas_pivo"] = (sklad["kvas_pivo"]||0)+1;
  if (type === "varit_pivo")     sklad["pivo"] = (sklad["pivo"]||0)+1;
  if (type === "lisovat_vino")   sklad["most_vino"] = (sklad["most_vino"]||0)+1;
  if (type === "kvasit_vino")    sklad["vino"] = (sklad["vino"]||0)+1;
  if (type === "delat_popkorn") sklad["popkorn"] = (sklad["popkorn"]||0)+1;
  if (type.startsWith("kvasit_") && OVOCE.includes(type.replace("kvasit_",""))) {
    let ovo = type.replace("kvasit_","");
    let kvasKey = "kvas_" + ovo;
    sklad[kvasKey] = (sklad[kvasKey]||0)+1;
  }
  if (type.startsWith("palit_") && OVOCE.includes(type.replace("palit_",""))) {
    let ovo = type.replace("palit_","");
    let palenkaKey = "palenka_" + ovo;
    sklad[palenkaKey] = (sklad[palenkaKey]||0)+1;
  }
  setSklad(sklad);
  vypisStatus("Výroba dokončena!", 1);
  stavPrachy();
}

window.onload = function() {
  renderMachinesShop();
  vykresliVyrobu();
  stavPrachy();
  runProductionTimers();
};
</script>
