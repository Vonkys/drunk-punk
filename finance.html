<!DOCTYPE html>
<html>
<head>
  <title>Pi platba test</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
  <button id="btn-pay">Zaplatit 5 Pi</button>
  <script>
    // Přímá inicializace hned po načtení
    document.addEventListener("DOMContentLoaded", function () {
      if (window.Pi && Pi.init) {
        Pi.init({ version: "2.0", sandbox: false });
        alert("Pi SDK inicializováno");
      } else {
        alert("Pi SDK nenalezeno, jsi v hajzlu!");
      }

      document.getElementById("btn-pay").onclick = async function () {
        try {
          alert("Klik – spouštím autentizaci");
          var scopes = ["username", "payments"];
          var auth = await Pi.authenticate(scopes, function (payment) {
            alert("Neúplná platba (zavření popupu nebo reload): " + JSON.stringify(payment));
          });

          if (!auth || !auth.accessToken || !auth.user) {
            alert("Chyba při autentizaci!");
            return;
          }
          alert("Autentizace OK: " + auth.user.username);

          var paymentData = {
            amount: 5,
            memo: "Top up 600 tokens",
            metadata: { type: "topup", amount: 600 }
          };

          alert("Volám Pi.createPayment!");

          await Pi.createPayment(paymentData, {
            onReadyForServerApproval: function (paymentId) {
              alert("Platba připravena ke schválení: " + paymentId);
              fetch("https://backend-production-9cdf.up.railway.app/approve", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ paymentId: paymentId })
              })
              .then(function(res){return res.json();})
              .then(function(data){alert("Backend /approve OK: " + JSON.stringify(data));})
              .catch(function(err){alert("Backend /approve ERR: " + err);});
            },
            onReadyForServerCompletion: function (paymentId, txid) {
              alert("Platba potvrzena Pi Networkem! paymentId: " + paymentId + ", txid: " + txid);
              fetch("https://backend-production-9cdf.up.railway.app/complete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ paymentId: paymentId, txid: txid })
              })
              .then(function(res){return res.json();})
              .then(function(data){alert("Backend /complete OK: " + JSON.stringify(data));})
              .catch(function(err){alert("Backend /complete ERR: " + err);});
            },
            onCancel: function () {
              alert("Platba zrušena uživatelem!");
            },
            onError: function (err) {
              alert("Chyba v platbě: " + (err && err.message ? err.message : err));
            }
          });

        } catch (e) {
          alert("Chyba ve flow: " + (e && e.message ? e.message : e));
        }
      };
    });
  </script>
</body>
</html>
