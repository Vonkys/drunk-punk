<!DOCTYPE html>
<html>
<head>
  <title>Pi platba – test</title>
</head>
<body>
  <button id="btn-pay">Zaplatit 5 Pi</button>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script>
    // Backend adresa
    var backendUrl = "https://backend-production-9cdf.up.railway.app";

    // INIT Pi SDK! MUSÍ být jako první, jinak nic dál nefunguje.
    if (window.Pi) {
      Pi.init({
        version: "2.0", // nebo jinou dle dokumentace, ale 2.0 funguje
        sandbox: false  // true = testnet, false = mainnet
      });
    }

    document.getElementById("btn-pay").onclick = async function () {
      if (!window.Pi) {
        alert("Pi SDK není dostupné!");
        return;
      }
      try {
        // 1) Autentizace
        const scopes = ["payments", "username"];
        const auth = await Pi.authenticate(scopes, function (payment) {
          alert("Neúplná platba: " + JSON.stringify(payment));
        });

        if (!auth || !auth.accessToken || !auth.user) {
          alert("Chyba při autentizaci!");
          return;
        }
        alert("Autentizace OK: " + auth.user.username);

        // 2) Spuštění platby
        const paymentData = {
          amount: 5,
          memo: "Top up 600 tokens",
          metadata: { type: "topup", amount: 600 }
        };

        alert("Volám Pi.createPayment!");
        await Pi.createPayment(paymentData, {
          onReadyForServerApproval: function (paymentId) {
            alert("Platba připravena ke schválení: " + paymentId);
            fetch(backendUrl + "/approve", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paymentId: paymentId })
            })
            .then(res => res.json())
            .then(data => alert("Backend /approve OK: " + JSON.stringify(data)))
            .catch(err => alert("Backend /approve ERR: " + err));
          },
          onReadyForServerCompletion: function (paymentId, txid) {
            alert("Platba potvrzena Pi Networkem! paymentId: " + paymentId + ", txid: " + txid);
            fetch(backendUrl + "/complete", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paymentId: paymentId, txid: txid })
            })
            .then(res => res.json())
            .then(data => alert("Backend /complete OK: " + JSON.stringify(data)))
            .catch(err => alert("Backend /complete ERR: " + err));
          },
          onCancel: function () {
            alert("Platba zrušena uživatelem!");
          },
          onError: function (err) {
            alert("Chyba v platbě: " + (err && err.message ? err.message : err));
          }
        });
      } catch (e) {
        alert("Chyba ve flow: " + (e && e.message ? e.message : e));
      }
    };
  </script>
</body>
</html>
