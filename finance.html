<button onclick="pay()">Zaplatit 3.14 Test-Pi</button>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>
  Pi.init({ version: "2.0", sandbox: true });
  function pay() {
    Pi.authenticate(["username", "payments"], (payment) => { alert("Nedokončená platba: " + JSON.stringify(payment)); })
    .then(auth => {
      alert("AUTH OK " + JSON.stringify(auth));
      return Pi.createPayment({
        amount: 3.14,
        memo: "test",
        metadata: { type: "test" }
      }, {
        onReadyForServerApproval: function(paymentId) {
          alert("APPROVE " + paymentId);
          // tvůj backend /approve
          fetch("https://backend-production-9cdf.up.railway.app/approve", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ paymentId: paymentId })
          }).then(x => x.json()).then(d => alert("BACKEND APPROVE: " + JSON.stringify(d)));
        },
        onReadyForServerCompletion: function(paymentId, txid) {
          alert("COMPLETE " + paymentId + " txid: " + txid);
          fetch("https://backend-production-9cdf.up.railway.app/complete", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ paymentId: paymentId, txid: txid })
          }).then(x => x.json()).then(d => alert("BACKEND COMPLETE: " + JSON.stringify(d)));
        },
        onCancel: function() { alert("CANCEL"); },
        onError: function(err) { alert("ERROR: " + (err && err.message ? err.message : err)); }
      });
    })
    .catch(err => alert("AUTH FAIL: " + (err && err.message ? err.message : err)));
  }
</script>
